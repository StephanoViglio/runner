name: Release

on:
  push:
    tags:
      - 'assinatura-v[0-9]+.[0-9]+.[0-9]+*'
      - 'assinador-v[0-9]+.[0-9]+.[0-9]+*'
      - 'simulador-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write

env:
  COSIGN_YES: "true"

jobs:

  release-assinatura:
    name: "[assinatura] Build, Sign e Publish"
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'assinatura-v')
    defaults:
      run:
        working-directory: assinatura
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: assinatura/go.mod
          cache-dependency-path: assinatura/go.sum

      - uses: sigstore/cosign-installer@v3.5.0

      - name: Download dependencies
        run: go mod download

      - name: Extrair versão da tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"        # assinatura-v1.0.0
          VERSION="${TAG#assinatura-}"         # v1.0.0
          VERSION_CLEAN="${VERSION#v}"         # 1.0.0
          echo "VERSION=$VERSION"             >> $GITHUB_OUTPUT
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Build (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.ver.outputs.VERSION }}-linux-amd64" .

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.ver.outputs.VERSION }}-windows-amd64.exe" .

      - name: Build (darwin/amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.ver.outputs.VERSION }}-darwin-amd64" .

      - name: Gerar checksums SHA256 e assinar com Cosign
        working-directory: ${{ github.workspace }}/dist
        run: |
          for f in *; do
            sha256sum "$f" > "$f.sha256"
            cosign sign-blob \
              --output-certificate "$f.pem" \
              --output-signature   "$f.sig" \
              "$f"
          done

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "assinatura ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: ${{ github.workspace }}/dist/*

  release-assinador:
    name: "[assinador] Build, Sign e Publish"
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'assinador-v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - uses: sigstore/cosign-installer@v3.5.0

      - name: Extrair versão da tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"        # assinador-v1.0.0
          VERSION="${TAG#assinador-}"          # v1.0.0
          VERSION_CLEAN="${VERSION#v}"         # 1.0.0
          echo "VERSION=$VERSION"             >> $GITHUB_OUTPUT
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Build com Maven
        working-directory: assinador
        run: mvn clean package -DskipTests

      - name: Preparar artefato
        working-directory: assinador
        run: |
          VERSION_CLEAN="${{ steps.ver.outputs.VERSION_CLEAN }}"
          JAR=$(ls target/assinador-*.jar | grep -v '\.original$' | head -1)
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$JAR" "$GITHUB_WORKSPACE/dist/assinador-${VERSION_CLEAN}.jar"

      - name: Gerar checksum SHA256 e assinar com Cosign
        working-directory: ${{ github.workspace }}/dist
        run: |
          for f in assinador-*.jar; do
            sha256sum "$f" > "$f.sha256"
            cosign sign-blob \
              --output-certificate "$f.pem" \
              --output-signature   "$f.sig" \
              "$f"
          done

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "assinador ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: ${{ github.workspace }}/dist/*

      - name: Atualizar release.json
        run: |
          VERSION_CLEAN="${{ steps.ver.outputs.VERSION_CLEAN }}"
          TAG="${{ github.ref_name }}"
          ARTIFACT="assinador-${VERSION_CLEAN}.jar"
          SHA256=$(cut -d' ' -f1 "$GITHUB_WORKSPACE/dist/$ARTIFACT.sha256")
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ARTIFACT}"

          jq --arg v   "$VERSION_CLEAN" \
             --arg url "$URL"           \
             --arg tag "$TAG"           \
             --arg sha "$SHA256"        \
             '.jar.version = $v | .jar.url = $url | .jar.tag = $tag | .jar.sha256 = $sha' \
             release.json > release.tmp && mv release.tmp release.json

      - name: Commit release.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json
          git commit -m "chore(release): atualiza release.json para ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main

  release-simulador:
    name: "[simulador] Build, Sign e Publish"
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'simulador-v')
    defaults:
      run:
        working-directory: simulador
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: simulador/go.mod
          cache-dependency-path: simulador/go.sum

      - uses: sigstore/cosign-installer@v3.5.0

      - name: Download dependencies
        run: go mod download

      - name: Extrair versão da tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"        # simulador-v1.0.0
          VERSION="${TAG#simulador-}"          # v1.0.0
          VERSION_CLEAN="${VERSION#v}"         # 1.0.0
          echo "VERSION=$VERSION"             >> $GITHUB_OUTPUT
          echo "VERSION_CLEAN=$VERSION_CLEAN" >> $GITHUB_OUTPUT

      - name: Build (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.ver.outputs.VERSION }}-linux-amd64" .

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.ver.outputs.VERSION }}-windows-amd64.exe" .

      - name: Build (darwin/amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.ver.outputs.VERSION }}-darwin-amd64" .

      - name: Gerar checksums SHA256 e assinar com Cosign
        working-directory: ${{ github.workspace }}/dist
        run: |
          for f in *; do
            sha256sum "$f" > "$f.sha256"
            cosign sign-blob \
              --output-certificate "$f.pem" \
              --output-signature   "$f.sig" \
              "$f"
          done

      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "simulador ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          files: ${{ github.workspace }}/dist/*
