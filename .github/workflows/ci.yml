name: CI

# Roda em pushes para main e em PRs direcionados à main.
# Configure como required status check nas branch-protection rules.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:

  # ──────────────────────────────────────────────────────────
  # Detecta quais aplicações foram modificadas
  # ──────────────────────────────────────────────────────────
  changes:
    name: Detectar alterações
    runs-on: ubuntu-latest
    outputs:
      assinatura: ${{ steps.filter.outputs.assinatura }}
      assinador:  ${{ steps.filter.outputs.assinador }}
      simulador:  ${{ steps.filter.outputs.simulador }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            assinatura:
              - 'assinatura/**'
              - '.github/workflows/ci.yml'
            assinador:
              - 'assinador/**'
              - '.github/workflows/ci.yml'
            simulador:
              - 'simulador/**'
              - '.github/workflows/ci.yml'

  # ════════════════════════════════════════════════════════
  #  ASSINATURA  (Go CLI)
  # ════════════════════════════════════════════════════════

  test-assinatura:
    name: "[assinatura] Test / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.assinatura == 'true'
    defaults:
      run:
        working-directory: assinatura
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: assinatura/go.mod
          cache-dependency-path: assinatura/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint (go vet)
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  build-assinatura:
    name: "[assinatura] Build"
    runs-on: ubuntu-latest
    needs: [changes, test-assinatura]
    if: needs.changes.outputs.assinatura == 'true'
    defaults:
      run:
        working-directory: assinatura
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: assinatura/go.mod
          cache-dependency-path: assinatura/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Extrair versão
        id: version
        run: |
          RAW=$(grep -oP 'Version:\s*"\K[^"]+' cmd/root.go)
          echo "VERSION=v$RAW" >> $GITHUB_OUTPUT

      - name: Build (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.version.outputs.VERSION }}-linux-amd64" .

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.version.outputs.VERSION }}-windows-amd64.exe" .

      - name: Build (darwin/amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/assinatura-${{ steps.version.outputs.VERSION }}-darwin-amd64" .

      - uses: actions/upload-artifact@v4
        with:
          name: assinatura-binaries
          path: dist/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  #  ASSINADOR  (Java / Maven)
  # ════════════════════════════════════════════════════════

  test-assinador:
    name: "[assinador] Test / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.assinador == 'true'
    defaults:
      run:
        working-directory: assinador
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: mvn test

  build-assinador:
    name: "[assinador] Build"
    runs-on: ubuntu-latest
    needs: [changes, test-assinador]
    if: needs.changes.outputs.assinador == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build com Maven
        working-directory: assinador
        run: mvn clean package -DskipTests

      - name: Preparar artefato
        working-directory: assinador
        run: |
          JAR=$(ls target/assinador-*.jar | grep -v '\.original$' | head -1)
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp "$JAR" "$GITHUB_WORKSPACE/dist/"

      - uses: actions/upload-artifact@v4
        with:
          name: assinador-jar
          path: dist/
          retention-days: 7

  # ════════════════════════════════════════════════════════
  #  SIMULADOR  (Go CLI)
  # ════════════════════════════════════════════════════════

  test-simulador:
    name: "[simulador] Test / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.simulador == 'true'
    defaults:
      run:
        working-directory: simulador
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: simulador/go.mod
          cache-dependency-path: simulador/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint (go vet)
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  build-simulador:
    name: "[simulador] Build"
    runs-on: ubuntu-latest
    needs: [changes, test-simulador]
    if: needs.changes.outputs.simulador == 'true'
    defaults:
      run:
        working-directory: simulador
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: simulador/go.mod
          cache-dependency-path: simulador/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Extrair versão
        id: version
        run: |
          RAW=$(grep -oP 'Version:\s*"\K[^"]+' cmd/root.go)
          echo "VERSION=v$RAW" >> $GITHUB_OUTPUT

      - name: Build (linux/amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.version.outputs.VERSION }}-linux-amd64" .

      - name: Build (windows/amd64)
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.version.outputs.VERSION }}-windows-amd64.exe" .

      - name: Build (darwin/amd64)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" \
            -o "$GITHUB_WORKSPACE/dist/simulador-${{ steps.version.outputs.VERSION }}-darwin-amd64" .

      - uses: actions/upload-artifact@v4
        with:
          name: simulador-binaries
          path: dist/
          retention-days: 7
